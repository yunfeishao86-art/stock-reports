  .header {

  .header h1 { font-size: 28px; background: linear-gradient(90deg, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header .date { color: #888; margin-top: 8px; font-size: 14px; }
  .header .summary { margin-top: 16px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
  .summary-item { text-align: center; }
  .summary-item .label { font-size: 12px; color: #888; }
  .summary-item .value { font-size: 20px; font-weight: bold; margin-top: 4px; }
  .up { color: #ff4757; }
  .down { color: #2ed573; }
  .flat { color: #ffa502; }
  
  .stock-card {
    background: rgba(255,255,255,0.05); border-radius: 16px;
    padding: 24px; margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(10px); transition: all 0.3s;
    cursor: pointer;
  }
  .stock-card:hover { transform: translateY(-2px); border-color: rgba(0,210,255,0.3); }
  .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .stock-name { font-size: 20px; font-weight: bold; }
  .stock-code { font-size: 13px; color: #888; margin-top: 2px; }
  .stock-price { text-align: right; }
  .stock-price .price { font-size: 24px; font-weight: bold; }
  .stock-price .change { font-size: 14px; margin-top: 2px; }
  
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .metric { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px; text-align: center; }
  .metric .m-label { font-size: 11px; color: #888; }
  .metric .m-value { font-size: 16px; font-weight: 600; margin-top: 4px; }
  
  .analysis { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 16px; margin-top: 12px; }
  .analysis h4 { color: #00d2ff; margin-bottom: 8px; font-size: 14px; }
  .analysis p { font-size: 13px; line-height: 1.8; color: #bbb; }
  
  .chart-container { position: relative; height: 200px; margin: 16px 0; }
  .chart-canvas { width: 100%; height: 100%; }
  
  .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
  .tag { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
  .tag-buy { background: rgba(46,213,115,0.15); color: #2ed573; }
  .tag-hold { background: rgba(255,165,2,0.15); color: #ffa502; }
  .tag-sell { background: rgba(255,71,87,0.15); color: #ff4757; }
  .tag-info { background: rgba(0,210,255,0.15); color: #00d2ff; }
  
  .detail-panel {
    max-height: 0; overflow: hidden; transition: max-height 0.5s ease;
  }
  .detail-panel.open { max-height: 2000px; }
  
  .expand-btn {
    background: none; border: 1px solid rgba(255,255,255,0.1);
    color: #00d2ff; padding: 8px 16px; border-radius: 8px;
    cursor: pointer; font-size: 13px; margin-top: 12px;
    transition: all 0.3s; width: 100%;
  }
  .expand-btn:hover { background: rgba(0,210,255,0.1); }
  
  .footer { text-align: center; padding: 20px; color: #555; font-size: 12px; margin-top: 20px; }
  .disclaimer { background: rgba(255,71,87,0.08); border: 1px solid rgba(255,71,87,0.15); border-radius: 10px; padding: 16px; margin-top: 24px; }
  .disclaimer h4 { color: #ff4757; margin-bottom: 8px; }
  .disclaimer p { font-size: 12px; color: #888; line-height: 1.8; }

  /* SVG Chart Styles */
  .line-chart { width: 100%; height: 200px; }
  .line-chart path { fill: none; stroke-width: 2; }
  .line-chart .area { opacity: 0.1; }
  .line-chart .grid line { stroke: rgba(255,255,255,0.05); }
  .line-chart .grid text { fill: #555; font-size: 10px; }
  .chart-tooltip {
    position: absolute; background: rgba(0,0,0,0.85); color: #fff;
    padding: 8px 12px; border-radius: 8px; font-size: 12px;
    pointer-events: none; display: none; z-index: 10;
  }

    .metrics { grid-template-columns: repeat(2, 1fr); }
    .header h1 { font-size: 22px; }

function renderChart(points, color) {
  const w = 600, h = 200, pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;
  
  if (!points || points.length < 2) return '<p style="color:#555;text-align:center;padding:40px 0;">暂无走势数据</p>';
  
  const vals = points.map(p => p.value);
  const min = Math.min(...vals) * 0.998;
  const max = Math.max(...vals) * 1.002;
  const range = max - min || 1;
  
  const scaleX = i => pad.left + (i / (points.length - 1)) * cw;
  const scaleY = v => pad.top + ch - ((v - min) / range) * ch;
  
  let pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${scaleX(i).toFixed(1)},${scaleY(p.value).toFixed(1)}`).join(' ');
  let areaD = pathD + ` L${scaleX(points.length-1).toFixed(1)},${pad.top + ch} L${pad.left},${pad.top + ch} Z`;
  
  let gridLines = '';
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (ch / 4) * i;
    const val = max - (range / 4) * i;
    gridLines += `<line x1="${pad.left}" y1="${y}" x2="${w-pad.right}" y2="${y}"/>`;
    gridLines += `<text x="${pad.left-5}" y="${y+4}" text-anchor="end">${val.toFixed(2)}</text>`;
  }
  
  let labels = '';
  const step = Math.ceil(points.length / 5);
  points.forEach((p, i) => {
    if (i % step === 0 || i === points.length - 1) {
      labels += `<text x="${scaleX(i)}" y="${h-5}" text-anchor="middle">${p.label || ''}</text>`;
    }
  });
  
  let dots = points.map((p, i) => {
    const show = i === 0 || i === points.length - 1 || p.highlight;
    return show ? `<circle cx="${scaleX(i)}" cy="${scaleY(p.value)}" r="3" fill="${color}"/>` : '';
  }).join('');
  
  return `<svg viewBox="0 0 ${w} ${h}" class="line-chart">
    <g class="grid">${gridLines}${labels}</g>
    <path d="${areaD}" fill="${color}" class="area"/>
    <path d="${pathD}" stroke="${color}"/>
    ${dots}
  </svg>`;
}

function renderCards(data) {
  const container = document.getElementById('stockCards');
  
  data.forEach((stock, idx) => {
    const changeClass = stock.changePercent > 0 ? 'up' : stock.changePercent < 0 ? 'down' : 'flat';
    const changeSign = stock.changePercent > 0 ? '+' : '';
    const arrow = stock.changePercent > 0 ? '📈' : stock.changePercent < 0 ? '📉' : '➡️';
    
    const signal = stock.signal || '观望';
    const signalClass = signal === '买入' ? 'tag-buy' : signal === '卖出' ? 'tag-sell' : 'tag-hold';
    
    const metrics = `
      <div class="metrics">
        <div class="metric"><div class="m-label">今开</div><div class="m-value">${stock.open || '--'}</div></div>
        <div class="metric"><div class="m-label">最高</div><div class="m-value ${stock.high > stock.prevClose ? 'up' : ''}">${stock.high || '--'}</div></div>
        <div class="metric"><div class="m-label">最低</div><div class="m-value ${stock.low < stock.prevClose ? 'down' : ''}">${stock.low || '--'}</div></div>
        <div class="metric"><div class="m-label">昨收</div><div class="m-value">${stock.prevClose || '--'}</div></div>
        <div class="metric"><div class="m-label">成交量</div><div class="m-value">${stock.volume || '--'}</div></div>
        <div class="metric"><div class="m-label">成交额</div><div class="m-value">${stock.turnover || '--'}</div></div>
      </div>
    `;
    
    const chartColor = stock.changePercent > 0 ? '#ff4757' : stock.changePercent < 0 ? '#2ed573' : '#ffa502';
    const chart = stock.trend ? `<div class="chart-container">${renderChart(stock.trend, chartColor)}</div>` : '';
    
    const tags = `
      <div class="tags">
        <span class="tag ${signalClass}">${arrow} ${signal}</span>
        ${stock.pe ? `<span class="tag tag-info">PE ${stock.pe}</span>` : ''}
        ${stock.marketCap ? `<span class="tag tag-info">市值 ${stock.marketCap}</span>` : ''}
        ${stock.tags ? stock.tags.map(t => `<span class="tag tag-info">${t}</span>`).join('') : ''}
      </div>
    `;
    
    const analysis = stock.analysis ? `
      <div class="analysis">
        <h4>🔍 深度分析</h4>
        <p>${stock.analysis}</p>
      </div>
    ` : '';
    
    const html = `
      <div class="stock-card" onclick="toggleDetail(${idx})">
        <div class="stock-header">
          <div>
            <div class="stock-name">${stock.name}</div>
            <div class="stock-code">${stock.code} · ${stock.market || 'A股'}</div>
          </div>
          <div class="stock-price">
            <div class="price ${changeClass}">${stock.price || '--'}</div>
            <div class="change ${changeClass}">${changeSign}${stock.change || '--'} (${changeSign}${stock.changePercent || '--'}%)</div>
          </div>
        </div>
        ${metrics}
        ${chart}
        ${tags}
        <button class="expand-btn" onclick="event.stopPropagation();toggleDetail(${idx})">
          <span id="btnText${idx}">▼ 展开详细分析</span>
        </button>
        <div class="detail-panel" id="detail${idx}">
          ${analysis}
        </div>
      </div>
    `;
    container.innerHTML += html;
    
    // Update summary
    const sumEl = document.getElementById(`sumStock${idx+1}`);
    if (sumEl) {
      sumEl.className = `value ${changeClass}`;
      sumEl.textContent = `${changeSign}${stock.changePercent || '--'}%`;
    }
  });
}

function toggleDetail(idx) {
  const panel = document.getElementById(`detail${idx}`);
  const btn = document.getElementById(`btnText${idx}`);
  if (panel.classList.contains('open')) {

    btn.textContent = '▼ 展开详细分析';
  } else {
    panel.classList.add('open');
    btn.textContent = '▲ 收起详细分析';
  }
}
